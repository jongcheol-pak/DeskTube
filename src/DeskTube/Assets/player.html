<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>DeskTube Player</title>
<style>
  /* 배경창의 바닥색 — 영상 로드 전 검정 유지 (Win32 배경창(WallpaperSurface)의 검정 브러시와 일치) */
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
  /* 크기·위치는 전부 applyLayout이 px·transform으로 관리한다 (크기 모드 × 화질 스케일 통합 — plan D2) */
  #stage { position: absolute; top: 0; left: 0; transform-origin: top left; }
  #stage iframe { width: 100%; height: 100%; border: 0; }
  /* 곡 전환 썸네일 브리지 (FR-1 보강) — loadVideoById의 로드 공백(검은 화면) 동안 다음 곡 썸네일을
     표시하고, 실제 재생(PLAYING) 진입 시 페이드아웃한다. object-fit은 크기 모드에 맞춰 JS가 지정. */
  #bridge { position: absolute; inset: 0; width: 100%; height: 100%; display: none;
            opacity: 0; transition: opacity .4s ease; pointer-events: none; }
  #bridge.visible { opacity: 1; }
</style>
</head>
<body>
<div id="stage"><div id="player"></div><img id="bridge" alt="" decoding="async" /></div>
<script>
'use strict';

// ============================================================================
// DeskTube 플레이어 브리지 (plan D8)
//   C# -> JS 명령: load / play / pause / volume / mute / seek / scale / fit / captions
//   JS -> C# 이벤트: ready / state / error / time (time은 current + duration 동반 — FR-18)
// setPlaybackQuality는 no-op이므로(PRD 제약) 화질은 렌더 해상도 스케일로 간접 제어한다.
// ============================================================================

// 스크립트 리비전 — C# 로그로 "실행 중인 player.html이 어느 버전인지" 확인용
// (WebView2가 가상 호스트 응답을 캐시해 옛 파일이 실행될 수 있음 — 수정 시 반드시 +1)
const PLAYER_REV = 8;

let player = null;
let playerReady = false;
let pending = [];          // ready 전에 도착한 명령 큐
let scaleHeight = 0;       // 0 = 원본 (창 크기 그대로)
let fitMode = 0;           // C# FitMode와 일치: 0=채움(Cover) 1=맞춤(Contain) 2=늘리기(Stretch)
let desiredMuted = false;  // 코디네이터가 지정한 음소거 상태 (워치독 복원 기준)
let desiredVolume = 100;
let desiredCaptions = false; // 자막 표시 상태 (FR-20 — 기본 끔, load 시마다 재적용)
let autoplayWatchdog = null;
let startWatchdog = null;          // 재생 시작 감시 — 재생 불가(삭제·제한·권한 필요 등 onError 미발생) 감지 후 스킵 (FR-1 보강)
let watchdogLastTime = -1;         // 직전 감시 시점의 currentTime — 진행 여부 비교용
let watchdogChecks = 0;            // 진행 재확인 횟수 (상한 START_RECHECK_MAX)
const START_TIMEOUT_MS = 8000;     // load 후 이 시간까지 재생 진행을 확인 (튜닝 가능)
const START_RECHECK_MS = 4000;     // 진행 흔적이 있으면 이 간격으로 재확인 (느린 시작·초기 버퍼링 오탐 방지)
const START_RECHECK_MAX = 3;       // 재확인 상한 — 이후에도 미진행이면 재생 불가 확정
const PLAYBACK_PROGRESS_MIN = 1.0; // currentTime이 이 값(초)만큼도 안 늘면 재생 불가로 판정

function post(obj) {
  try { window.chrome.webview.postMessage(obj); } catch (e) { /* 호스트 없음 - 무시 */ }
}

// ---- 곡 전환 썸네일 브리지 (FR-1 보강) ----
// loadVideoById는 이전 영상을 즉시 내리고 다음 영상을 받아오는 1~3초 동안 검은 화면을 보인다.
// 그 공백을 다음 곡 썸네일로 덮고, 재생이 실제로 시작되면(PLAYING) 페이드아웃한다.
// maxresdefault가 없는 영상은 유튜브가 120x90 자리표시자를 200으로 반환하므로
// naturalWidth로 판별해 hqdefault로 폴백한다. 썸네일 로드 실패는 기존 검은 화면과 동일(무해).
const bridge = document.getElementById('bridge');
let bridgeFallback = false;
bridge.onload = () => {
  if (bridge.naturalWidth <= 120 && !bridgeFallback) {
    bridgeFallback = true;
    bridge.src = bridge.src.replace('maxresdefault', 'hqdefault');
  }
};
bridge.onerror = () => {
  if (!bridgeFallback) {
    bridgeFallback = true;
    bridge.src = bridge.src.replace('maxresdefault', 'hqdefault');
  } else {
    hideBridge();
  }
};

// 크기 모드와 시각적으로 일치: 채움(0)=cover / 맞춤(1)=contain / 늘리기(2)=fill
function bridgeFit() {
  return fitMode === 1 ? 'contain' : (fitMode === 2 ? 'fill' : 'cover');
}

function showBridge(videoId) {
  bridgeFallback = false;
  bridge.style.objectFit = bridgeFit();
  bridge.src = 'https://i.ytimg.com/vi/' + videoId + '/maxresdefault.jpg';
  bridge.style.display = 'block';
  bridge.classList.add('visible');
}

function hideBridge() {
  bridge.classList.remove('visible'); // opacity 페이드아웃 (display는 유지 — 다음 show에서 재사용)
}

// ---- 크기 모드(FR-16) × 화질 스케일(FR-13) 통합 레이아웃 (plan D2) ----
// 두 설정이 같은 #stage를 조작하므로 반드시 한 함수에서 함께 계산한다.
// 스테이지를 렌더 해상도(px)로 만들고 CSS transform으로 화면에 배치한다:
//   채움   — 16:9 영역으로 화면을 덮고(오버스캔) 중앙 배치, 넘침은 body가 크롭
//   맞춤   — 화면 크기 그대로 (유튜브 iframe이 영상비 유지 레터박스)
//   늘리기 — 16:9 렌더를 비균등 스케일로 화면에 꽉 채움 (왜곡 허용)
function applyLayout() {
  const stage = document.getElementById('stage');
  const w = window.innerWidth, h = window.innerHeight;
  if (w <= 0 || h <= 0) { return; }

  // 1) 모드별 화면 배치 — 논리 영역(스크린 px): 위치 x,y / 크기 lw,lh
  let x = 0, y = 0, lw = w, lh = h;
  if (fitMode === 0) { // 채움: 16:9로 화면을 덮는 최소 크기, 중앙 정렬
    if (w / h >= 16 / 9) { lw = w; lh = w * 9 / 16; y = (h - lh) / 2; }
    else { lh = h; lw = h * 16 / 9; x = (w - lw) / 2; }
  }
  // 맞춤(1)·늘리기(2)의 논리 영역은 화면 전체 (lw=w, lh=h)

  // 2) 렌더 해상도 — 화질 스케일이 논리 높이보다 작을 때만 축소 렌더
  //    늘리기는 렌더를 16:9로 강제해 레터박스 없이 영상만 왜곡되게 한다
  const baseH = (scaleHeight > 0 && scaleHeight < lh) ? scaleHeight : lh;
  const renderH = baseH;
  const renderW = (fitMode === 2) ? renderH * 16 / 9 : lw * (renderH / lh);

  // 3) 렌더 px → 논리 영역으로 확대·이동 (늘리기는 sx≠sy 비균등)
  const sx = lw / renderW, sy = lh / renderH;
  stage.style.width = Math.round(renderW) + 'px';
  stage.style.height = Math.round(renderH) + 'px';
  stage.style.transform = 'translate(' + x + 'px,' + y + 'px) scale(' + sx + ',' + sy + ')';
}
window.addEventListener('resize', applyLayout);
applyLayout(); // 초기 배치 (fit/scale 명령 도착 전 기본값으로)

// ---- C# 명령 수신 ----
window.chrome.webview.addEventListener('message', (e) => {
  const cmd = e.data;
  // 레이아웃 명령은 플레이어 준비와 무관 — 즉시 반영
  if (cmd.Type === 'scale') { scaleHeight = cmd.Height || 0; applyLayout(); return; }
  if (cmd.Type === 'fit') { fitMode = cmd.Mode || 0; applyLayout(); bridge.style.objectFit = bridgeFit(); return; }
  if (!playerReady) { pending.push(cmd); return; }
  execute(cmd);
});

// C# 명령 수신 리스너가 등록됐음을 호스트에 알린다 — 이 신호 이후 전송된 명령은 위 리스너(및 ready 전
// pending 큐)에 확실히 도달한다. InitializeAsync가 이 신호를 기다린 뒤 명령을 보내므로, 페이지 로딩
// 공백 중 PostWebMessage가 폐기되어 load 등이 유실되던 문제를 막는다 (2026-07-19 멀티모니터 미재생 수정).
post({ type: 'hostReady', rev: PLAYER_REV });

function execute(cmd) {
  switch (cmd.Type) {
    case 'load':
      showBridge(cmd.VideoId); // 로드 공백 동안 다음 곡 썸네일 표시 (PLAYING 진입 시 해제)
      player.loadVideoById(cmd.VideoId);
      applyCaptions(); // 곡 전환 시 자막 모듈 상태가 리셋될 수 있어 재적용 (FR-20)
      armAutoplayWatchdog();
      armStartWatchdog(); // 재생 불가 감지 시작 — 곡 로드 시점부터 PLAYING 도달을 감시
      break;
    case 'play':
      player.playVideo();
      armAutoplayWatchdog();
      armStartWatchdog(); // 재개 시 새 시각 기준으로 재장전 — 절전(suspend) 중 살아남은 스테일 타이머의
                          // 재개 직후 오발화 방지 + 재개 후에도 미진행 영상은 계속 감지 (FR-1 보강)
      break;
    case 'pause':
      clearTimeout(autoplayWatchdog); // load/play가 예약한 워치독이 일시정지 의도를 뒤집지 않게 취소
      clearStartWatchdog();           // 일시정지 의도 — 재생 시작 감시도 취소(진행 없음이 정상)
      player.pauseVideo();
      break;
    case 'volume':
      desiredVolume = cmd.Volume;
      player.setVolume(cmd.Volume);
      break;
    case 'mute':
      desiredMuted = !!cmd.Muted;
      if (desiredMuted) { player.mute(); } else { player.unMute(); player.setVolume(desiredVolume); }
      break;
    case 'seek':
      player.seekTo(cmd.Seconds, true);
      break;
    case 'captions':
      desiredCaptions = !!cmd.Enabled;
      applyCaptions();
      break;
  }
}

// ---- 자막 표시 제어 (FR-20) ----
// 공식 playerVars에는 "강제 끄기"가 없어 모듈 load/unload로 제어한다 (비공식 API — PRD 제약 고지).
// 모듈명은 HTML5 플레이어 'captions', 구형 경로 'cc' — 미존재 모듈 호출은 무시되므로 둘 다 시도.
// 실패해도 재생에는 영향을 주지 않는다 (자막 제어만 무동작).
function applyCaptions() {
  if (!player || typeof player.loadModule !== 'function') { return; }
  try {
    if (desiredCaptions) {
      player.loadModule('captions');
      player.loadModule('cc');
    } else {
      player.unloadModule('captions');
      player.unloadModule('cc');
    }
  } catch (e) { /* 비공식 API 변경 대비 — 무시 */ }
}

// 자동재생 인자가 안 먹는 환경 대비 (plan Risks): 2초 내 재생이 시작되지 않으면
// 음소거로 강제 시작(muted autoplay는 항상 허용) 후 onStateChange에서 원복한다.
function armAutoplayWatchdog() {
  clearTimeout(autoplayWatchdog);
  autoplayWatchdog = setTimeout(() => {
    if (player && player.getPlayerState && player.getPlayerState() !== YT.PlayerState.PLAYING) {
      player.mute();
      player.playVideo();
    }
  }, 2000);
}

// 재생 불가 감지 (FR-1 보강): 삭제·비공개·임베드/지역/연령 제한·로그인 권한 필요 영상은 onError를
// 내지 않고 조용히 멈추는 경우가 있어 오류 기반 스킵이 걸리지 않는다. 특히 권한 필요 영상은
// getPlayerState()가 PLAYING을 반환하면서도 실제 재생은 진행되지 않으므로(currentTime 정지),
// 재생 여부는 상태값이 아니라 currentTime 증가로 판정한다.
//   - 정상 곡은 1초 주기 시각 보고 인터벌이 진행(PLAYBACK_PROGRESS_MIN 이상) 확인 즉시 감시를
//     해제하므로 타이머가 발화하지 않는다 (곡마다 diag가 쌓이지 않음).
//   - START_TIMEOUT_MS 시점에 미진행이라도, 직전 확인 대비 조금이라도 늘고 있으면(느린 시작·
//     초기 버퍼링) START_RECHECK_MS 간격으로 최대 START_RECHECK_MAX회 재확인해 오탐을 막는다.
//   - currentTime을 못 읽는 상태(API 부재·undefined·NaN)는 죽은 플레이어 증거로 보고 즉시 -3.
// autoplay watchdog(2초 mute+play)이 먼저 자동재생을 시도한 뒤에도 재생이 진행되지 않는 경우만 걸린다.
function armStartWatchdog() {
  clearTimeout(startWatchdog);
  watchdogLastTime = -1;
  watchdogChecks = 0;
  startWatchdog = setTimeout(checkStartProgress, START_TIMEOUT_MS);
}

function clearStartWatchdog() {
  clearTimeout(startWatchdog);
  startWatchdog = null;
}

function checkStartProgress() {
  startWatchdog = null;
  const state = (player && player.getPlayerState) ? player.getPlayerState() : 'n/a';
  const raw = (player && player.getCurrentTime) ? player.getCurrentTime() : NaN;
  const time = (typeof raw === 'number' && isFinite(raw)) ? raw : -1; // 못 읽으면 -1로 정규화
  // 판정 근거 보고 — 스킵 미동작 진단용 (C#이 로그로 남김; 정상 곡은 인터벌 해제로 여기 안 옴)
  post({ type: 'diag', msg: 'start-watchdog state=' + state
    + ' time=' + (time >= 0 ? time.toFixed(2) : 'n/a') + ' checks=' + watchdogChecks });
  if (time >= PLAYBACK_PROGRESS_MIN) {
    return; // 정상 진행 확인 — 감시 종료
  }
  if (time > watchdogLastTime + 0.1 && watchdogChecks < START_RECHECK_MAX) {
    // 진행 흔적 있음 — 재확인 유예 (느린 네트워크에서 정상 곡을 오탐 스킵하지 않기 위함)
    watchdogLastTime = time;
    watchdogChecks++;
    startWatchdog = setTimeout(checkStartProgress, START_RECHECK_MS);
    return;
  }
  post({ type: 'error', code: -3 }); // 재생 미진행 — 코디네이터가 재생 불가로 스킵
}

// ---- IFrame API 로드 ----
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
tag.onerror = () => post({ type: 'error', code: -1 }); // 네트워크 실패 — C#이 재시도 (plan Edge Case)
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = function () {
  player = new YT.Player('player', {
    width: '100%',
    height: '100%',
    playerVars: {
      autoplay: 0,       // 재생은 항상 명령으로 시작 (코디네이터 소유)
      controls: 0,       // 배경화면 — 컨트롤 UI 제거
      disablekb: 1,
      fs: 0,
      iv_load_policy: 3, // 오버레이 주석 숨김
      rel: 0,
      playsinline: 1
    },
    events: {
      onReady: () => {
        playerReady = true;
        post({ type: 'ready', rev: PLAYER_REV });
        const queued = pending;
        pending = [];
        queued.forEach(execute);
        // 재생 중 1초 주기 시각 보고 — 다중 모니터 동기 보정용 (plan D4)
        setInterval(() => {
          if (player.getPlayerState() === YT.PlayerState.PLAYING) {
            const t = player.getCurrentTime();
            // duration도 함께 보고 — 재생시간 표시용 캐시 (FR-18). 라이브·미로드는 0/비유한이라
            // 0으로 정규화(getCurrentTime 타입 가드와 동일 관례). C#은 같은 틱의 current와 쌍으로 받아
            // 곡 전환 오귀속 없이 현재 곡에 귀속한다.
            const rawDur = player.getDuration();
            const d = (typeof rawDur === 'number' && isFinite(rawDur) && rawDur > 0) ? rawDur : 0;
            post({ type: 'time', current: t, duration: d });
            // 실제 진행 확인 즉시 시작 감시 해제 — 정상 곡은 타이머 발화·diag 보고 자체가 없다
            if (startWatchdog !== null && typeof t === 'number' && isFinite(t)
                && t >= PLAYBACK_PROGRESS_MIN) {
              clearStartWatchdog();
            }
          }
        }, 1000);
      },
      onStateChange: (e) => {
        // 워치독이 음소거로 시작시킨 경우, 재생 확인 후 지정 상태로 복원
        if (e.data === YT.PlayerState.PLAYING && !desiredMuted && player.isMuted()) {
          player.unMute();
          player.setVolume(desiredVolume);
        }
        // 영상 로드가 자막 모듈 상태를 비동기로 리셋할 수 있어 재생 진입 시점에 설정을 재적용한다
        // (load 직후의 동기 적용만으로는 새 영상 초기화에 덮일 수 있음 — FR-20)
        // 시작 감시(startWatchdog)는 PLAYING 도달만으로 해제하지 않는다 — 권한 필요 영상은 PLAYING에
        // 도달하고도 재생이 진행되지 않기 때문. 해제는 1초 인터벌이 currentTime 진행을 확인했을 때만.
        if (e.data === YT.PlayerState.PLAYING) { applyCaptions(); hideBridge(); }
        post({ type: 'state', state: e.data });
      },
      onError: (e) => post({ type: 'error', code: e.data }) // 101/150 = 임베드 금지 (코디네이터가 스킵)
    }
  });
};
</script>
</body>
</html>
